<!DOCTYPE html>
<html>
<head>
    <title>Reward Processing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s ease;
        }
        h1 {
            color: #4CAF50;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .bones {
            font-size: 24px;
            color: #8B4513;
            font-weight: bold;
            margin: 20px 0;
        }
        .close-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>Reward Earned!</h1>
        <p>You've successfully watched an ad and earned:</p>
        <div class="bones" id="bonesAmount">1 Bone</div>
        <p id="userInfo"></p>
        <p>Your balance has been updated in the app.</p>
        <button class="close-btn" onclick="closeWindow()">Close</button>
    </div>

    <script>
        const BACKEND_URL = 'https://your-backend.onrender.com';
        const ADSGRAM_API_KEY = 'YOUR_ADSGRAM_API_KEY';

        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user');
        const bonesParam = urlParams.get('bones');
        const bones = Number(bonesParam);

        if (!userId || !bonesParam || Number.isNaN(bones) || bones <= 0) {
            document.querySelector('.container').innerHTML = `
                <div class="error-icon">⚠️</div>
                <h1>Error</h1>
                <p>Missing or invalid reward parameters.</p>
                <p>Received user=${userId} bones=${bonesParam}</p>
                <button class="close-btn" onclick="closeWindow()">Close</button>
            `;
            console.error('Invalid reward parameters', userId, bonesParam);
        } else {
            document.getElementById('bonesAmount').textContent = bones + ' Bone' + (bones > 1 ? 's' : '');
            document.getElementById('userInfo').textContent = `User ID: ${userId}`;

            const storageKey = `boneApp_${userId}`;
            let savedData = localStorage.getItem(storageKey);
            let existing = 0;

            try {
                existing = savedData ? parseInt(savedData, 10) : 0;
            } catch (err) {
                existing = 0;
            }

            const newBalance = existing + bones;
            localStorage.setItem(storageKey, newBalance);
            localStorage.setItem('boneBalance_dev', newBalance);

            fetch(`${BACKEND_URL}/api/reward`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-adsgram-api-key': ADSGRAM_API_KEY
                },
                body: JSON.stringify({
                    user_id: userId,
                    amount: bones,
                    transaction_id: urlParams.get('transaction_id') || `web-${Date.now()}`
                })
            })
            .then(res => res.json())
            .then(data => console.log('Backend reward response', data))
            .catch(err => console.warn('Backend reward request failed', err));

            if (window.opener) {
                window.opener.postMessage({ type: 'REWARD_EARNED', userId, bones }, '*');
            }

            console.log(`Reward processed: User ${userId} earned ${bones} bone(s). New balance: ${newBalance}`);
        }

        function closeWindow() {
            try { window.close(); } catch (e) { /* ignore */ }
            setTimeout(() => { window.location.href = 'https://bone-earning-app.vercel.app'; }, 400);
        }
    </script>
</body>
</html>
